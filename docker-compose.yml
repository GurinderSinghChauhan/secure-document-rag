services:
  api:
    build: .
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - private
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_DB: secure_rag
      POSTGRES_USER: secure_rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secure_rag -d secure_rag"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.5.4
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - private
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  private:
    internal: true

volumes:
  ollama-data:
  postgres-data:
  qdrant-data:
